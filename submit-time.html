<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERCC 클립 등록 (분초 직접입력)</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
  :root {
    --bg: #fafbfc;
    --card: #ffffff;
    --border: #e4e7ec;
    --border-strong: #cfd4dc;
    --text: #1a1d23;
    --muted: #5b6271;
    --accent: #ff6b00;
    --accent-soft: #fff1e5;
    --link: #1a73e8;
    --success: #1e8e3e;
    --error: #d93025;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", "맑은 고딕", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    font-size: 18px;
  }
  header {
    padding: 32px 24px 20px;
    border-bottom: 2px solid var(--border);
    background: var(--bg);
  }
  header h1 {
    margin: 0 0 10px;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  header h1 .tag {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 18px;
    font-weight: 800;
    margin-right: 12px;
    vertical-align: 4px;
  }
  .back-btn {
    background: transparent;
    color: var(--accent);
    border: 2px solid var(--accent);
    padding: 8px 18px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 15px;
    font-weight: 700;
    transition: all 0.15s;
  }
  .back-btn:hover { background: var(--accent-soft); }
  .meta { color: var(--muted); font-size: 16px; }
  nav.form-tabs {
    display: flex;
    gap: 6px;
    margin-top: 14px;
  }
  nav.form-tabs .tab {
    padding: 10px 18px;
    border: 2px solid var(--border-strong);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    text-decoration: none;
    color: var(--text);
    font-weight: 600;
    font-size: 15px;
    background: var(--card);
    transition: background 0.15s;
  }
  nav.form-tabs .tab:hover { background: var(--accent-soft); }
  nav.form-tabs .tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  main { padding: 24px; max-width: 720px; margin: 0 auto; }
  .card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
  }
  .field {
    margin-bottom: 22px;
  }
  .field label {
    display: block;
    font-weight: 700;
    margin-bottom: 8px;
    font-size: 16px;
  }
  .field label .req { color: var(--error); margin-left: 4px; }
  .field label .inline-hint {
    color: var(--muted);
    font-size: 13px;
    font-weight: 400;
    margin-left: 8px;
  }
  .field .hint {
    color: var(--muted);
    font-size: 13px;
    margin-top: 4px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    font: inherit;
    padding: 12px 14px;
    border: 2px solid var(--border-strong);
    border-radius: 8px;
    background: #fff;
    color: var(--text);
    font-size: 17px;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .row2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  button.submit {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 16px;
    border-radius: 10px;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    transition: background 0.15s;
  }
  button.submit:hover:not(:disabled) { background: #e85d00; }
  button.submit:disabled { background: #c4c9d1; cursor: not-allowed; }
  .alert {
    padding: 14px 18px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-weight: 600;
  }
  .alert.success { background: #e6f4ea; color: var(--success); border: 1px solid #81c995; }
  .alert.error { background: #fce8e6; color: var(--error); border: 1px solid #f28b82; }
  footer {
    text-align: center;
    padding: 28px 20px;
    color: var(--muted);
    font-size: 14px;
  }
  footer a { color: var(--link); }
  @media (max-width: 700px) {
    body { font-size: 16px; }
    header h1 { font-size: 26px; }
    .card { padding: 20px; }
    .row2 { grid-template-columns: 1fr; }
    nav.form-tabs .tab { padding: 8px 12px; font-size: 13px; flex: 1; text-align: center; }
    .field label .inline-hint { display: block; margin: 2px 0 0; }
  }
</style>
</head>
<body>
<header>
  <h1>
    <span><span class="tag">ERCC</span>클립 등록 (분초 직접입력)</span>
    <a class="back-btn" href="index.html">← 목록으로</a>
  </h1>
  <div class="meta">유튜브 영상의 구간·선수·제목을 입력하면 클립 목록에 자동 추가됩니다.</div>
  <nav class="form-tabs">
    <a class="tab" href="submit.html">Timecode 복붙</a>
    <a class="tab active" href="submit-time.html">분초 직접입력</a>
  </nav>
</header>

<main>
  <div class="card">
    <div id="alert" class="alert" hidden></div>
    <form id="f">
      <div class="field">
        <label>작성자<span class="req">*</span> <span class="inline-hint">이름과 생년을 (ex. 조던63) 정확히 입력하세요 (인증대체)</span></label>
        <input name="author" required autocomplete="off" spellcheck="false">
      </div>

      <div class="row2">
        <div class="field">
          <label>선수 1<span class="req">*</span></label>
          <input name="player1" required placeholder="예: 두현">
        </div>
        <div class="field">
          <label>선수 2</label>
          <input name="player2" placeholder="(생략가능, 여러명일 경우 콤마구분)">
          <div class="hint">어시스트 등,...</div>
        </div>
      </div>

      <div class="field">
        <label>추천 제목<span class="req">*</span></label>
        <input name="title" required placeholder="예: 좌중간 3점슛" maxlength="100">
      </div>

      <div class="field">
        <label>영상 타입<span class="req">*</span> <span class="inline-hint">분류를 위해 정확히 입력해주세요</span></label>
        <select name="kind" required>
          <option value="">선택하세요</option>
          <option>속공</option>
          <option>미들슛</option>
          <option>3점</option>
          <option>림어택</option>
          <option>드라이빈</option>
          <option>굿패스</option>
          <option>스틸</option>
          <option>슛블록</option>
          <option>Funny</option>
          <option>기타</option>
        </select>
      </div>

      <div class="field">
        <label>유튜브 영상 URL<span class="req">*</span></label>
        <input name="video_url" required type="url" placeholder="https://youtu.be/XXXXX 또는 https://www.youtube.com/watch?v=XXXXX">
        <div class="hint">시작 시간 표시(`?t=`) 없는 기본 URL. 짧은 링크/긴 링크/Shorts URL 모두 지원</div>
      </div>

      <div class="row2">
        <div class="field">
          <label>시작 시점<span class="req">*</span></label>
          <input name="start_time" required placeholder="예: 1:23" autocomplete="off">
          <div class="hint">분:초 또는 시:분:초 (예: <code>5:23</code>, <code>1:05:30</code>)</div>
        </div>
        <div class="field">
          <label>종료 시점<span class="req">*</span></label>
          <input name="end_time" required placeholder="예: 1:30" autocomplete="off">
          <div class="hint">시작보다 뒤, 차이 5분 이내</div>
        </div>
      </div>

      <div id="turnstile-widget" style="margin-bottom: 12px;"></div>
      <button type="submit" class="submit" id="submit-btn">클립 등록</button>
    </form>
  </div>
</main>

<footer>
  Powered by DH An · <a href="index.html">클립 목록 보기</a>
</footer>

<script>
// ============================================================
// ERCC submit form (분초 입력 방식): Turnstile + Edge Function
// ============================================================

const SUPABASE_URL       = 'https://wfwzxnyelpbgjxlovjgo.supabase.co';
const SUPABASE_ANON_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indmd3p4bnllbHBiZ2p4bG92amdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAzNDM3NDcsImV4cCI6MjA3NTkxOTc0N30.STu6r2vK5ghEBXHXF_IYdJPsjaxc0efUEUn3pbSrAXM';
const TURNSTILE_SITE_KEY = '0x4AAAAAADC3ZBzU0cDichSX';
const EDGE_URL           = `${SUPABASE_URL}/functions/v1/submit-clip`;

const form    = document.getElementById('f');
const btn     = document.getElementById('submit-btn');
const alertEl = document.getElementById('alert');

function showAlert(type, msg) {
  alertEl.className = `alert ${type}`;
  alertEl.textContent = msg;
  alertEl.hidden = false;
  alertEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// 다양한 유튜브 URL 형식에서 video ID 추출
function extractVideoId(url) {
  if (!url) return null;
  const patterns = [
    /youtu\.be\/([^?&/]+)/,                       // youtu.be/XXX
    /youtube\.com\/watch\?[^#]*v=([^&]+)/,        // youtube.com/watch?v=XXX
    /youtube\.com\/shorts\/([^?&/]+)/,            // youtube.com/shorts/XXX
    /youtube\.com\/embed\/([^?&/]+)/,             // youtube.com/embed/XXX
    /youtube\.com\/v\/([^?&/]+)/,                 // youtube.com/v/XXX
  ];
  for (const re of patterns) {
    const m = url.match(re);
    if (m) return m[1];
  }
  return null;
}

// "5:23" 또는 "1:05:30" 또는 "323" 같은 형식 → 초로 변환
function parseTime(str) {
  if (!str) return null;
  const trimmed = String(str).trim();
  if (!/^\d+(:\d+)*$/.test(trimmed)) return null;
  const parts = trimmed.split(':').map(p => parseInt(p, 10));
  if (parts.length === 1) return parts[0];                              // SS
  if (parts.length === 2) return parts[0] * 60 + parts[1];              // MM:SS
  if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2]; // HH:MM:SS
  return null;
}

// ===== Turnstile =====
let widgetId = null;
let pendingTokenResolve = null;

function waitForTurnstile() {
  return new Promise(resolve => {
    if (window.turnstile) return resolve(window.turnstile);
    const timer = setInterval(() => {
      if (window.turnstile) {
        clearInterval(timer);
        resolve(window.turnstile);
      }
    }, 50);
  });
}

async function initTurnstile() {
  const turnstile = await waitForTurnstile();
  widgetId = turnstile.render('#turnstile-widget', {
    sitekey: TURNSTILE_SITE_KEY,
    size: 'invisible',
    callback: (token) => {
      if (pendingTokenResolve) {
        pendingTokenResolve(token);
        pendingTokenResolve = null;
      }
    },
    'error-callback': () => {
      if (pendingTokenResolve) {
        pendingTokenResolve(null);
        pendingTokenResolve = null;
      }
    },
    'expired-callback': () => {
      if (pendingTokenResolve) {
        pendingTokenResolve(null);
        pendingTokenResolve = null;
      }
    },
  });
}

async function getTurnstileToken() {
  if (widgetId === null) {
    showAlert('error', 'CAPTCHA 가 아직 로드되지 않았습니다. 잠시 후 다시 시도해주세요.');
    return null;
  }
  const turnstile = window.turnstile;
  return new Promise(resolve => {
    pendingTokenResolve = resolve;
    turnstile.reset(widgetId);
    turnstile.execute(widgetId);
    setTimeout(() => {
      if (pendingTokenResolve === resolve) {
        pendingTokenResolve = null;
        resolve(null);
      }
    }, 30000);
  });
}

initTurnstile();

// ===== 폼 제출 =====
form.addEventListener('submit', async e => {
  e.preventDefault();
  alertEl.hidden = true;

  const data = Object.fromEntries(new FormData(form));
  data.player2 = (data.player2 || '').trim() || null;

  // Video ID 추출
  const vid = extractVideoId(data.video_url);
  if (!vid) {
    showAlert('error', '유튜브 영상 URL 에서 영상 ID를 인식하지 못했습니다.');
    return;
  }

  // 시작/종료 시간 파싱
  const sSec = parseTime(data.start_time);
  const eSec = parseTime(data.end_time);
  if (sSec == null) {
    showAlert('error', '시작 시점 형식이 잘못됐습니다. 예: 1:23');
    return;
  }
  if (eSec == null) {
    showAlert('error', '종료 시점 형식이 잘못됐습니다. 예: 1:30');
    return;
  }
  if (sSec >= eSec) {
    showAlert('error', `종료(${eSec}s)가 시작(${sSec}s)보다 뒤여야 합니다.`);
    return;
  }
  if (eSec - sSec > 300) {
    showAlert('error', '클립 길이가 5분을 초과합니다. 구간을 줄여주세요.');
    return;
  }

  // start_url, end_url 구성 (Edge Function 이 기대하는 youtu.be/XXX?t=N 형식)
  const startUrl = `https://youtu.be/${vid}?t=${sSec}`;
  const endUrl   = `https://youtu.be/${vid}?t=${eSec}`;

  btn.disabled = true;
  btn.textContent = '검증 중...';

  const token = await getTurnstileToken();
  if (!token) {
    btn.disabled = false;
    btn.textContent = '클립 등록';
    showAlert('error', 'CAPTCHA 검증 실패. 새로고침 후 다시 시도하세요.');
    return;
  }

  btn.textContent = '등록 중...';

  let res, body;
  try {
    res = await fetch(EDGE_URL, {
      method: 'POST',
      headers: {
        'Content-Type':  'application/json',
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'apikey':         SUPABASE_ANON_KEY,
      },
      body: JSON.stringify({
        token,
        payload: {
          start_url: startUrl,
          end_url:   endUrl,
          player1:   data.player1.trim(),
          player2:   data.player2,
          title:     data.title.trim(),
          kind:      data.kind,
          author:    data.author.trim(),
        },
      }),
    });
    body = await res.json().catch(() => ({}));
  } catch (err) {
    btn.disabled = false;
    btn.textContent = '클립 등록';
    showAlert('error', `네트워크 오류: ${err.message}`);
    return;
  }

  btn.disabled = false;
  btn.textContent = '클립 등록';

  if (!res.ok) {
    showAlert('error', `등록 실패: ${body.error || res.statusText}`);
    return;
  }

  showAlert('success', '클립이 등록되었습니다. 목록에서 확인하세요.');
  form.reset();
});
</script>
</body>
</html>
