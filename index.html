<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERCC 농구 클립 모음</title>
<style>
  :root {
    --bg: #fafbfc;
    --card: #ffffff;
    --border: #e4e7ec;
    --border-strong: #cfd4dc;
    --text: #1a1d23;
    --muted: #5b6271;
    --accent: #ff6b00;
    --accent-soft: #fff1e5;
    --link: #1a73e8;
    --row-hover: #f5f7fa;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", "맑은 고딕", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    font-size: 18px;
  }
  header {
    padding: 32px 24px 20px;
    border-bottom: 2px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.03);
  }
  header h1 {
    margin: 0 0 10px;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  header h1 .tag {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 18px;
    font-weight: 800;
    margin-right: 12px;
    vertical-align: 4px;
  }
  .add-btn {
    background: var(--accent);
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 16px;
    font-weight: 700;
    transition: background 0.15s;
  }
  .add-btn:hover { background: #e85d00; }
  .add-btn::before { content: "+ "; }
  .meta {
    color: var(--muted);
    font-size: 16px;
  }
  nav.tabs {
    display: flex;
    gap: 6px;
    margin-top: 18px;
  }
  nav.tabs button {
    background: var(--card);
    border: 2px solid var(--border-strong);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    font-size: 18px;
    font-weight: 600;
    border-bottom: none;
    transition: all 0.15s;
  }
  nav.tabs button:hover { background: var(--accent-soft); }
  nav.tabs button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  main { padding: 24px; max-width: 1200px; margin: 0 auto; }
  #status {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 18px;
  }
  #status.error { color: #d93025; }
  section.group {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 14px;
    margin-bottom: 22px;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
  }
  section.group h2 {
    margin: 0;
    padding: 18px 22px;
    font-size: 22px;
    font-weight: 700;
    background: var(--accent-soft);
    border-bottom: 2px solid var(--border);
    color: var(--accent);
    letter-spacing: -0.01em;
  }
  section.group h2 .count {
    color: var(--muted);
    font-weight: 500;
    font-size: 16px;
    margin-left: 10px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 17px;
  }
  th, td {
    padding: 14px 18px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  th {
    font-weight: 700;
    color: var(--muted);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: #f5f7fa;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--row-hover); }
  a.yt {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #ffecec;
    color: #d93025;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
    transition: background 0.15s;
  }
  a.yt:hover { background: #ffd0d0; }
  a.yt::before { content: "▶"; font-size: 13px; }
  .kind {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 600;
  }
  .kind.속공 { background: #e6f4ea; color: #1e8e3e; }
  .kind.미들슛 { background: #e8f0fe; color: #1967d2; }
  .kind.3점 { background: #f3e8fd; color: #8430ce; }
  .kind.림어택 { background: #fef0e3; color: #e8710a; }
  .kind.드라이빈 { background: #fce4ec; color: #c2185b; }
  .kind.굿패스 { background: #e8eaf6; color: #3f51b5; }
  .kind.스틸 { background: #fde7e9; color: #c5221f; }
  .kind.슛블록 { background: #e0f2f1; color: #00695c; }
  .kind.Funny { background: #fef7e0; color: #c99a00; }
  .kind.기타 { background: #eceff1; color: #546e7a; }
  .player {
    font-weight: 700;
    color: var(--accent);
    font-size: 18px;
  }
  .player2 {
    color: var(--text);
    font-weight: 500;
  }
  .author {
    color: var(--muted);
    font-size: 15px;
  }
  .title-cell { color: var(--text); font-weight: 500; }
  .date-cell {
    font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
    color: var(--text);
    font-weight: 600;
    font-size: 15px;
    white-space: nowrap;
  }
  .empty { color: #c4c9d1; }
  .view { display: none; }
  .view.active { display: block; }
  footer {
    text-align: center;
    padding: 28px 20px;
    color: var(--muted);
    font-size: 15px;
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--link); }
  /* PC: 모바일 전용 날짜 칩 숨김 */
  .cell-date-mobile-only { display: none; }
  .date-chip-mobile { display: none; }

  @media (max-width: 700px) {
    body { font-size: 16px; }
    header { padding: 20px 16px 14px; }
    header h1 { font-size: 22px; gap: 8px; }
    header h1 .tag { font-size: 14px; padding: 3px 8px; margin-right: 6px; vertical-align: 3px; }
    .add-btn { padding: 8px 14px; font-size: 14px; }
    .meta { font-size: 14px; }
    nav.tabs { margin-top: 14px; }
    nav.tabs button { padding: 10px 16px; font-size: 15px; flex: 1; }
    main { padding: 12px; }
    section.group { border-radius: 10px; margin-bottom: 14px; }
    section.group h2 { font-size: 17px; padding: 12px 14px; }
    section.group h2 .count { font-size: 13px; }

    /* 표 → 카드 레이아웃 (Grid 기반) */
    table thead { display: none; }
    table, table tbody { display: block; width: 100%; }

    table tr {
      display: grid;
      grid-template-columns: max-content auto 1fr;
      grid-template-areas:
        "date video kind"
        "p1 p1 p2"
        "title title title"
        "author author author";
      column-gap: 10px;
      row-gap: 6px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: #fff;
      align-items: center;
    }
    table tr:last-child { border-bottom: none; }
    table tr:hover { background: #fff; }
    table tr:hover td { background: transparent; }

    table td {
      padding: 0;
      border: none;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    table td::before {
      content: attr(data-label);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    /* 각 셀 위치 지정 */
    table td.cell-date { grid-area: date; }
    table td.cell-video { grid-area: video; justify-self: start; }
    table td.cell-kind { grid-area: kind; justify-self: start; }
    table td.cell-p1 { grid-area: p1; }
    table td.player2 { grid-area: p2; }
    table td.title-cell { grid-area: title; }
    table td.cell-author { grid-area: author; }

    /* 모바일 전용 날짜 칩 노출 */
    .cell-date-mobile-only { display: flex !important; }
    .date-chip-mobile {
      display: inline-block;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
      white-space: nowrap;
    }
    /* 개인별 뷰의 PC용 date-cell 숨김, 칩 표시 */
    table td.cell-date .date-cell { display: none; }

    /* 상단 줄 라벨 숨김 */
    table td.cell-date::before,
    table td.cell-video::before,
    table td.cell-kind::before { display: none; }

    /* 제목: 라벨 제거, 큰 글씨 */
    table td.title-cell {
      font-size: 16px;
      font-weight: 700;
      padding: 8px 0 4px;
      border-top: 1px dashed var(--border);
      margin-top: 4px;
      display: block;
    }
    table td.title-cell::before { display: none; }

    /* 선수1 강조 */
    table td.cell-p1 .player { font-size: 16px; }

    /* 작성자 작게 */
    table td.cell-author { font-size: 13px; color: var(--muted); }

    /* 영상타입별 뷰 모바일 카드: kind 셀이 없으므로 video 가 그 자리까지 차지 */
    #by-kind table tr {
      grid-template-areas:
        "date video video"
        "p1 p1 p2"
        "title title title"
        "author author author";
    }
  }
</style>
</head>
<body>
<header>
  <h1>
    <span><span class="tag">ERCC</span>농구 클립 모음</span>
    <a class="add-btn" href="submit.html">클립 등록</a>
  </h1>
  <div class="meta">으랏차차 농구 · 총 <span id="total">-</span>개 클립</div>
  <nav class="tabs">
    <button data-view="by-game" class="active">게임별</button>
    <button data-view="by-player">개인별 (선수 1)</button>
    <button data-view="by-kind">영상타입별</button>
  </nav>
</header>

<main>
  <div id="status">클립 로딩 중...</div>
  <div id="by-game" class="view active" hidden></div>
  <div id="by-player" class="view" hidden></div>
  <div id="by-kind" class="view" hidden></div>
</main>

<footer>
  Powered by DH An · <a href="submit.html">클립 등록하기</a>
</footer>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://wfwzxnyelpbgjxlovjgo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indmd3p4bnllbHBiZ2p4bG92amdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAzNDM3NDcsImV4cCI6MjA3NTkxOTc0N30.STu6r2vK5ghEBXHXF_IYdJPsjaxc0efUEUn3pbSrAXM';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const fmtDate = d => d ? `${d.slice(0,4)}/${d.slice(4,6)}/${d.slice(6,8)}` : '날짜 미정';
const shortDate = d => d && d.length >= 8 ? `${d.slice(2,4)}/${d.slice(4,6)}/${d.slice(6,8)}` : '?';
const kindClass = k => (k || '').replace(/[^가-힣A-Za-z0-9]/g, '');
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const ytLabel = url => {
  const m = (url || '').match(/\?t=(\d+)/);
  if (!m) return "열기";
  const s = +m[1];
  const mm = Math.floor(s/60), ss = s % 60;
  return `${mm}:${String(ss).padStart(2,'0')}`;
};

const linkCell = url => `<a class="yt" href="${esc(url)}" target="_blank" rel="noopener">${ytLabel(url)}</a>`;
const kindCell = k => `<span class="kind ${kindClass(k)}">${esc(k)}</span>`;

async function loadClips() {
  const statusEl = document.getElementById('status');
  const { data, error } = await supabase
    .from('ercc_clips')
    .select('id, start_url, end_url, player1, player2, title, kind, author, game_date, game_num, start_sec')
    .order('game_date', { ascending: true, nullsFirst: false })
    .order('game_num',  { ascending: true, nullsFirst: false })
    .order('id',        { ascending: true });

  if (error) {
    statusEl.textContent = `데이터 로드 오류: ${error.message}`;
    statusEl.classList.add('error');
    return;
  }

  const clips = (data || []).map(r => ({
    seq: r.id,
    url: r.start_url,
    p1: r.player1,
    p2: r.player2 || "",
    title: r.title,
    kind: r.kind,
    author: r.author,
    date: r.game_date || "미분류",
    game: r.game_num ?? '?',
    startSec: r.start_sec ?? 0
  }));

  document.getElementById('total').textContent = clips.length;

  if (clips.length === 0) {
    statusEl.textContent = '아직 등록된 클립이 없습니다.';
    return;
  }

  render(clips);
  statusEl.hidden = true;
  document.getElementById('by-game').hidden = false;
  document.getElementById('by-player').hidden = false;
  document.getElementById('by-kind').hidden = false;
}

// 영상타입별 우선 노출 순서 (나머지는 ko 가나다순)
const KIND_PRIORITY = ['Funny', '3점'];

const cmpDateDesc = (a, b) => String(b.date).localeCompare(String(a.date));
const cmpGameDesc = (a, b) => Number(b.game) - Number(a.game);
const cmpTimeAsc  = (a, b) => Number(a.startSec) - Number(b.startSec);
const cmpTimeDesc = (a, b) => Number(b.startSec) - Number(a.startSec);

// 게임별 섹션 내부 정렬: 시간 ASC
const sortInGame = cmpTimeAsc;

// 개인별 섹션 내부: 날짜 DESC → 게임 DESC → 시간 ASC
const sortInPlayer = (a, b) => {
  let r = cmpDateDesc(a, b); if (r !== 0) return r;
  r = cmpGameDesc(a, b);     if (r !== 0) return r;
  return cmpTimeAsc(a, b);
};

// 영상타입별 섹션 내부: 날짜 DESC → 게임 DESC → 시간 DESC
const sortInKind = (a, b) => {
  let r = cmpDateDesc(a, b); if (r !== 0) return r;
  r = cmpGameDesc(a, b);     if (r !== 0) return r;
  return cmpTimeDesc(a, b);
};

function render(clips) {
  // ========== 게임별 뷰 (섹션: 날짜 DESC + 게임 DESC, 섹션 내부: 시간 ASC) ==========
  const byGame = {};
  for (const c of clips) {
    const key = `${c.date}_${String(c.game).padStart(2,'0')}`;
    (byGame[key] ||= { date: c.date, game: c.game, rows: [] }).rows.push(c);
  }
  const gameKeys = Object.keys(byGame).sort((a, b) => {
    const ga = byGame[a], gb = byGame[b];
    let r = cmpDateDesc(ga, gb); if (r !== 0) return r;
    return cmpGameDesc(ga, gb);
  });

  const gameHtml = gameKeys.map(k => {
    const g = byGame[k];
    g.rows.sort(sortInGame);
    const rows = g.rows.map(c => `
      <tr>
        <td class="cell-date cell-date-mobile-only"><span class="date-chip-mobile">${shortDate(c.date)} #${c.game}</span></td>
        <td class="cell-video" data-label="영상">${linkCell(c.url)}</td>
        <td class="cell-kind" data-label="타입">${kindCell(c.kind)}</td>
        <td class="cell-p1" data-label="선수1"><span class="player">${esc(c.p1)}</span></td>
        <td class="player2" data-label="선수2">${c.p2 ? esc(c.p2) : '<span class="empty">-</span>'}</td>
        <td class="title-cell" data-label="제목">${esc(c.title)}</td>
        <td class="author cell-author" data-label="작성자">${esc(c.author)}</td>
      </tr>
    `).join('');
    return `
      <section class="group">
        <h2>${fmtDate(g.date)} &nbsp;·&nbsp; GAME ${g.game}<span class="count">${g.rows.length}개</span></h2>
        <table>
          <thead><tr>
            <th style="width:100px">영상</th>
            <th style="width:130px">영상타입</th>
            <th style="width:90px">선수 1</th>
            <th style="width:90px">선수 2</th>
            <th>제목</th>
            <th style="width:100px">작성자</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </section>
    `;
  }).join('');
  document.getElementById('by-game').innerHTML = gameHtml;

  // ========== 개인별 뷰 ==========
  const byPlayer = {};
  for (const c of clips) {
    (byPlayer[c.p1] ||= []).push(c);
  }
  const playerKeys = Object.keys(byPlayer).sort((a,b) => a.localeCompare(b, 'ko'));

  const playerHtml = playerKeys.map(name => {
    const list = byPlayer[name].slice().sort(sortInPlayer);
    const rows = list.map(c => `
      <tr>
        <td class="cell-date" data-label="경기"><span class="date-cell">${fmtDate(c.date)} G${c.game}</span><span class="date-chip-mobile">${shortDate(c.date)} #${c.game}</span></td>
        <td class="cell-video" data-label="영상">${linkCell(c.url)}</td>
        <td class="cell-kind" data-label="타입">${kindCell(c.kind)}</td>
        <td class="player2" data-label="선수2">${c.p2 ? esc(c.p2) : '<span class="empty">-</span>'}</td>
        <td class="title-cell" data-label="제목">${esc(c.title)}</td>
        <td class="author cell-author" data-label="작성자">${esc(c.author)}</td>
      </tr>
    `).join('');
    return `
      <section class="group">
        <h2>${esc(name)}<span class="count">${list.length}개</span></h2>
        <table>
          <thead><tr>
            <th style="width:150px">경기</th>
            <th style="width:100px">영상</th>
            <th style="width:130px">영상타입</th>
            <th style="width:90px">선수 2</th>
            <th>제목</th>
            <th style="width:100px">작성자</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </section>
    `;
  }).join('');
  document.getElementById('by-player').innerHTML = playerHtml;

  // ========== 영상타입별 뷰 (KIND_ORDER 순, 섹션 내부 날짜 DESC) ==========
  const byKind = {};
  for (const c of clips) {
    (byKind[c.kind] ||= []).push(c);
  }
  const kindKeys = Object.keys(byKind).sort((a, b) => {
    const ai = KIND_PRIORITY.indexOf(a);
    const bi = KIND_PRIORITY.indexOf(b);
    if (ai !== -1 && bi !== -1) return ai - bi;
    if (ai !== -1) return -1;
    if (bi !== -1) return 1;
    return a.localeCompare(b, 'ko');
  });

  const kindHtml = kindKeys.map(kind => {
    const list = byKind[kind].slice().sort(sortInKind);
    const rows = list.map(c => `
      <tr>
        <td class="cell-date" data-label="경기"><span class="date-cell">${fmtDate(c.date)} G${c.game}</span><span class="date-chip-mobile">${shortDate(c.date)} #${c.game}</span></td>
        <td class="cell-video" data-label="영상">${linkCell(c.url)}</td>
        <td class="cell-p1" data-label="선수1"><span class="player">${esc(c.p1)}</span></td>
        <td class="player2" data-label="선수2">${c.p2 ? esc(c.p2) : '<span class="empty">-</span>'}</td>
        <td class="title-cell" data-label="제목">${esc(c.title)}</td>
        <td class="author cell-author" data-label="작성자">${esc(c.author)}</td>
      </tr>
    `).join('');
    return `
      <section class="group">
        <h2><span class="kind ${kindClass(kind)}" style="font-size:16px; padding:4px 14px; vertical-align: 2px;">${esc(kind)}</span><span class="count">${list.length}개</span></h2>
        <table>
          <thead><tr>
            <th style="width:150px">경기</th>
            <th style="width:100px">영상</th>
            <th style="width:90px">선수 1</th>
            <th style="width:90px">선수 2</th>
            <th>제목</th>
            <th style="width:100px">작성자</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </section>
    `;
  }).join('');
  document.getElementById('by-kind').innerHTML = kindHtml;
}

// ========== 탭 전환 ==========
document.querySelectorAll('nav.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav.tabs button').forEach(b => b.classList.toggle('active', b === btn));
    const target = btn.dataset.view;
    document.querySelectorAll('main .view').forEach(v => v.classList.toggle('active', v.id === target));
  });
});

loadClips();
